name: PurpleRTP
version: '${project.version}'
main: me.purplertp.plugin.PurpleRTP
api-version: '1.21'
description: Network-aware random teleport plugin with region menus.
authors: [PurpleRTP]

commands:
  rtp:
    description: Randomly teleport
    usage: /rtp
    permission: purplertp.use
  rtpadmin:
    description: Admin commands for PurpleRTP
    usage: /rtpadmin <reload|clearcooldown|forcertp|pool>
    permission: purplertp.admin

permissions:
  purplertp.use:
    description: Allows use of /rtp
    default: true
  purplertp.admin:
    description: Allows use of /rtpadmin
    default: op
  purplertp.bypass.cooldown:
    description: Bypass RTP cooldown
    default: op
